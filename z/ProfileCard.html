<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            width: 320px;
            border-radius: 16px;
            text-align: center;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #6366f1;
        }

        .card h1 {
            margin-top: 16px;
            font-size: 22px;
            color: #1e293b;
        }

        .card p.role {
            color: #6366f1;
            font-weight: 600;
            margin-top: 4px;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .card p.bio {
            margin-top: 12px;
            color: #475569;
            font-size: 14px;
            line-height: 1.5;
        }

        .socials {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .socials a {
            text-decoration: none;
            color: #ffffff;
            background: #6366f1;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .socials a:hover {
            background: #4338ca;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
        }

        .stats div h2 {
            font-size: 18px;
            color: #1e293b;
        }

        .stats div p {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .btn {
            margin-top: 24px;
            display: inline-block;
            background: #6366f1;
            color: #ffffff;
            padding: 10px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="A:\DG\@DEVANSH GUPTA\1. DEKSTOP\WORK STATION\Sigma_web_development\Photo\DG.jpeg"
            alt="Profile picture of Devansh Gupta">
        <h1>Devansh Gupta</h1>
        <p class="role">Full-Stack Developer</p>
        <p class="bio">
            B.Tech CSE (AI) student and freelance developer building clean, production-quality web experiences.
        </p>

        <div class="socials">
            <a href="#" aria-label="GitHub">GH</a>
            <a href="#" aria-label="LinkedIn">IN</a>
            <a href="#" aria-label="Twitter">TW</a>
        </div>

        <div class="stats">
            <div>
                <h2>42</h2>
                <p>Projects</p>
            </div>
            <div>
                <h2>1.2k</h2>
                <p>Followers</p>
            </div>
            <div>
                <h2>310</h2>
                <p>Following</p>
            </div>
        </div>

        <a href="#" class="btn">Follow</a>
    </div>

</body>

</html>
